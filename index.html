<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>台州府城 · 智慧文旅AI导览系统</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  :root{
    --page-color:#c9a14a;
    --primary:#c9a14a;
    --primary-dark:#8c6a24;
    --text:#1f2937;
    --bg:#fff;
    --glass:rgba(0,0,0,.45);
    --radius:14px;
    --shadow:0 8px 24px rgba(0,0,0,.18);
    --safe-bottom:env(safe-area-inset-bottom, 0px);
    --safe-top:env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--text);background:#000;overflow:hidden;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  a{text-decoration:none;color:inherit;}
  img,video{display:block;max-width:100%;}
  .app{position:relative;width:100vw;height:100vh;overflow:hidden;background:#111;}

  /* ============ Pages ============ */
  .page{
    position:absolute;inset:0;
    display:none;
    flex-direction:column;
    padding-top:calc(16px + var(--safe-top));
    padding-bottom:calc(72px + var(--safe-bottom));
    overflow:hidden;
  }
  /* Scenic, Q&A, Trip use full-height backgrounds */
  #scenic, #qa, #trip{
    padding-top:0;
    padding-bottom:calc(72px + var(--safe-bottom));
  }
  /* Trip & Q&A have internal controls so need top padding */
  #trip, #qa{
    padding-top:calc(16px + var(--safe-top));
  }
  .page.active{display:flex;}
  .page-bg{position:absolute;inset:0;z-index:0;overflow:hidden;background:#111;}
  .page-bg video,.page-bg img{
    width:100%;height:100%;object-fit:cover;display:block;
    background:#000;
  }
  .page-bg video{z-index:1;background:#000;}
  .page-bg video::-webkit-media-controls-start-playback-button{display:none;}
  .page-bg video::-webkit-media-controls{display:none;}
  .page-mask{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25) 0%,rgba(0,0,0,.55) 100%);z-index:1;}
  .page-content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;overflow:hidden;}

  /* ============ Top-right controls ============ */
  .top-bar{
    position:absolute;top:calc(12px + var(--safe-top));right:12px;z-index:30;
    display:flex;gap:10px;align-items:center;
  }
  .icon-btn{
    width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,.18);backdrop-filter:blur(10px);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:16px;transition:.25s;
    border:1px solid rgba(255,255,255,.25);
  }
  .icon-btn:hover{background:rgba(255,255,255,.28);transform:scale(1.05);}

  /* ============ Bottom Nav ============ */
  .bottom-nav{
    position:absolute;left:0;right:0;bottom:0;z-index:40;
    display:flex;justify-content:space-around;align-items:stretch;
    background:rgba(12,12,12,.92);backdrop-filter:blur(16px);
    padding:6px 8px calc(6px + var(--safe-bottom));
    border-top:1px solid rgba(255,255,255,.08);
    min-height:66px;
  }
  .nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;color:#bbb;font-size:12px;padding:6px 4px;
    min-height:50px;border-radius:10px;transition:.25s;
  }
  .nav-item i{font-size:20px;}
  .nav-item.active{color:var(--page-color);}
  .nav-item.active i{transform:scale(1.15);}
  .nav-item:hover{color:var(--page-color);}

  /* ============ Home Page ============ */
  #home .home-inner{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;text-align:center;padding:20px;
  }
  .home-title-big{
    font-size:clamp(40px,9vw,88px);font-weight:900;letter-spacing:.15em;
    color:#fff;text-shadow:0 6px 30px rgba(0,0,0,.6),0 0 20px rgba(201,161,74,.45);
    opacity:0;transform:translateY(20px) scale(.95);
    font-family:"STKaiti","KaiTi","楷体",serif;
    background:linear-gradient(180deg,#fff 0%,#ffe6a8 60%,#c9a14a 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,.6));
    pointer-events:none;
  }
  .home-title-big.show{animation:fadeShow 5s ease forwards;}
  @keyframes fadeShow{
    0%{opacity:0;transform:translateY(20px) scale(.92);}
    15%{opacity:1;transform:translateY(0) scale(1);}
    80%{opacity:1;transform:translateY(-4px) scale(1);}
    100%{opacity:0;transform:translateY(-20px) scale(1.02);}
  }
  .home-sub{
    margin-top:26px;padding:14px 28px;border-radius:40px;
    background:rgba(0,0,0,.35);backdrop-filter:blur(10px);
    color:#fff;font-size:clamp(16px,2.6vw,22px);letter-spacing:.2em;
    border:1px solid rgba(255,255,255,.2);
    font-family:"STKaiti","KaiTi","楷体",serif;
  }
  .home-entry{
    display:flex;gap:14px;margin-top:36px;flex-wrap:wrap;justify-content:center;
  }
  .entry-btn{
    padding:14px 24px;border-radius:40px;
    background:linear-gradient(135deg,rgba(201,161,74,.9),rgba(140,106,36,.92));
    color:#fff;font-size:15px;font-weight:600;letter-spacing:.1em;
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 6px 18px rgba(0,0,0,.3);
    transition:.25s;min-height:48px;
  }
  .entry-btn i{margin-right:8px;}
  .entry-btn:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.45);}
  .season-switch{
    position:absolute;left:14px;bottom:calc(82px + var(--safe-bottom));z-index:30;
    display:flex;gap:8px;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);
    padding:8px;border-radius:40px;border:1px solid rgba(255,255,255,.15);
  }
  .season-btn{
    width:42px;height:42px;border-radius:50%;color:#fff;font-size:16px;
    display:flex;align-items:center;justify-content:center;transition:.25s;
    background:rgba(255,255,255,.08);
  }
  .season-btn.active{background:var(--primary);box-shadow:0 0 14px var(--primary);color:#fff;}
  .season-btn[data-s="spring"]{--sb:#a7d9a2;}
  .season-btn[data-s="summer"]{--sb:#ffd76a;}
  .season-btn[data-s="autumn"]{--sb:#e68a3c;}
  .season-btn[data-s="winter"]{--sb:#9cc7ea;}
  .season-btn.active{background:var(--sb,var(--primary));}

  /* ============ Scenic Guide Page ============ */
  #scenic .map-wrap{
    position:absolute;inset:0;overflow:hidden;
    touch-action:none;
  }
  /* ============ Scenic Page Map ============ */
  .map-wrap{position:relative;width:100%;height:100%;overflow:hidden;touch-action:none;background:#0a0a0a;}
  .map-panels{
    position:absolute;top:50%;left:50%;
    width:1728px;height:2304px;
    transform-origin:center center;
    will-change:transform;
  }
  .map-img{
    position:absolute;top:0;left:0;
    width:100%;height:100%;
    background-size:100% 100%;
    background-position:0 0;
    background-repeat:no-repeat;
    will-change:transform;
  }
  .map-highlight-ring{
    position:absolute;
    width:180px;height:180px;border-radius:50%;
    border:3px solid var(--primary);
    background:radial-gradient(circle,rgba(201,161,74,.35),rgba(201,161,74,0) 70%);
    transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .4s;
    z-index:8;
  }
  .map-highlight-ring.show{opacity:1;animation:ringPulse 1.8s ease-in-out infinite;}
  @keyframes ringPulse{
    0%,100%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.12);}
  }
  .spot-btn{
    position:absolute;
    transform:translate(-50%,-50%);
    display:flex;align-items:center;gap:4px;
    padding:6px 10px 6px 8px;border-radius:40px;
    background:linear-gradient(135deg,rgba(255,255,255,.97),rgba(255,240,200,.92));
    color:#7a5512;font-size:13px;font-weight:600;
    box-shadow:0 4px 14px rgba(0,0,0,.35);
    border:2px solid #c9a14a;
    min-height:36px;transition:.25s;z-index:10;
    /* Disable native font scaling on mobile */
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
  }
  .spot-btn:hover{transform:translate(-50%,-50%) scale(1.06);}
  .spot-btn .dot{width:10px;height:10px;border-radius:50%;background:#c9a14a;box-shadow:0 0 8px #c9a14a;flex-shrink:0;}
  .spot-btn .nav-icon{
    display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:22px;border-radius:50%;
    background:#e8594a;color:#fff;font-size:11px;margin-left:2px;
    cursor:pointer;flex-shrink:0;transition:.25s;
  }
  .spot-btn .nav-icon:hover{background:#d13e30;transform:scale(1.15);}
  .spot-btn.region{
    background:linear-gradient(135deg,#c9a14a,#8c6a24);color:#fff;border-color:#fff;font-size:15px;padding:10px 16px;min-height:42px;
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(201,161,74,.6);}
    50%{box-shadow:0 0 0 14px rgba(201,161,74,0);}
  }
  .spot-btn.region .dot{background:#fff;box-shadow:0 0 8px #fff;}

  /* Page 2 side panel */
  .scenic-side-panel{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    width:min(320px,80vw);max-height:70vh;border-radius:var(--radius);
    background:rgba(255,255,255,.97);backdrop-filter:blur(10px);
    box-shadow:var(--shadow);padding:16px;z-index:20;
    overflow-y:auto;display:none;
  }
  .scenic-side-panel.show{display:block;animation:pop .3s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(-50%) scale(.92);}to{opacity:1;transform:translateY(-50%) scale(1);}}
  .scenic-side-panel h3{margin:0 0 10px;color:#7a5512;font-size:18px;display:flex;align-items:center;gap:8px;}
  .vr-btn{
    width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,#c9a14a,#8c6a24);
    color:#fff;font-size:15px;font-weight:600;margin:6px 0;display:flex;align-items:center;justify-content:center;gap:8px;
    min-height:48px;transition:.25s;
  }
  .vr-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(201,161,74,.4);}

  .spot-list{display:flex;flex-direction:column;gap:12px;}
  .spot-card{border-radius:12px;background:#fff;border:1px solid #eee;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08);}
  .spot-imgs{position:relative;width:100%;padding-top:56%;overflow:hidden;background:#000;}
  .spot-imgs img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .6s;}
  .spot-imgs img.active{opacity:1;}
  .spot-imgs .carousel-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:3;}
  .spot-imgs .carousel-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:.25s;}
  .spot-imgs .carousel-dots span.active{background:#fff;width:20px;border-radius:4px;}
  .spot-body{padding:14px;}
  .spot-body h4{margin:0 0 6px;color:#333;font-size:18px;display:flex;align-items:center;gap:8px;}
  .spot-body p{margin:0 0 10px;color:#555;font-size:14px;line-height:1.7;}
  .spot-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .spot-actions button{padding:8px 14px;border-radius:8px;background:#f3e7c7;color:#7a5512;font-size:13px;display:flex;align-items:center;gap:6px;min-height:40px;transition:.25s;}
  .spot-actions button:hover{background:#c9a14a;color:#fff;}
  .spot-actions button.active{background:#c9a14a;color:#fff;}
  .spot-close{position:absolute;right:8px;top:8px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;}

  /* VR Modal */
  .vr-modal{
    position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);
    display:none;align-items:center;justify-content:center;padding:16px;
  }
  .vr-modal.show{display:flex;}
  .vr-box{
    width:min(1100px,96vw);height:min(720px,86vh);
    background:#000;border-radius:14px;overflow:hidden;position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,.8);
  }
  .vr-box iframe{width:100%;height:100%;border:0;}
  .vr-controls{
    position:absolute;top:10px;left:10px;right:10px;display:flex;gap:10px;z-index:3;
  }

  /* ============ Trip Page ============ */
  #trip .trip-layout{
    display:flex;flex:1;gap:12px;padding:12px;overflow:hidden;
  }
  .trip-left{
    width:min(280px,30vw);background:rgba(255,255,255,.95);border-radius:var(--radius);
    padding:14px;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow);overflow-y:auto;
  }
  .trip-right{flex:1;background:rgba(255,255,255,.96);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:10px;overflow:hidden;}
  .trip-tab{padding:10px;border-radius:10px;background:#f3e7c7;color:#7a5512;font-weight:600;text-align:left;transition:.25s;min-height:42px;}
  .trip-tab.active{background:linear-gradient(135deg,#c9a14a,#8c6a24);color:#fff;}
  .route-btn{padding:10px;border-radius:10px;background:#fff;border:2px solid #e8d8a8;color:#7a5512;font-weight:600;text-align:left;display:flex;align-items:center;gap:8px;min-height:44px;transition:.25s;}
  .route-btn.active{border-color:#c9a14a;background:#fff8e7;}
  .route-img-wrap{flex:1;position:relative;border-radius:10px;overflow:hidden;background:#f6f0dd;min-height:260px;}
  .route-img{width:100%;height:100%;object-fit:contain;background:#f6f0dd;transition:transform .4s;}
  .zoom-controls{position:absolute;top:8px;right:8px;display:flex;gap:6px;z-index:2;}
  .zoom-controls button{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font-size:14px;}
  .route-desc{background:#fffaf0;padding:12px;border-radius:10px;color:#5c4423;font-size:14px;line-height:1.75;max-height:180px;overflow-y:auto;}

  .form-row{display:flex;flex-direction:column;gap:4px;}
  .form-row label{font-size:13px;color:#7a5512;font-weight:600;}
  .form-row select,.form-row input{padding:9px 10px;border-radius:8px;border:1px solid #e8d8a8;background:#fff;font-size:14px;min-height:42px;}
  .ai-gen-btn{padding:12px;border-radius:10px;background:linear-gradient(135deg,#c9a14a,#8c6a24);color:#fff;font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;min-height:48px;transition:.25s;}
  .ai-gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3);}
  .ai-gen-btn:disabled{opacity:.6;cursor:not-allowed;}
  .ai-plan-result{flex:1;background:#fffaf0;border-radius:10px;padding:14px;overflow-y:auto;color:#333;font-size:14px;line-height:1.8;white-space:pre-wrap;border:1px dashed #e8d8a8;}

  .weather-panel{
    position:absolute;top:calc(12px + var(--safe-top));right:12px;z-index:30;
    background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
    padding:10px 14px;border-radius:12px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:10px;font-size:13px;color:#5c4423;max-width:240px;
  }
  .weather-panel select{border:1px solid #e8d8a8;border-radius:6px;padding:3px 6px;font-size:12px;}
  .weather-panel .w-icon{font-size:20px;}

  /* ============ Q&A Page ============ */
  #qa .qa-layout{display:flex;flex-direction:column;height:100%;padding:16px;gap:12px;}
  .qa-card-wrap{
    position:relative;height:230px;border-radius:14px;overflow:visible;
  }
  .qa-cards-scroll{
    position:absolute;top:0;left:0;right:0;height:170px;overflow:hidden;border-radius:14px;
    background:#fdf6e3;
    background-image:linear-gradient(rgba(253,246,227,.92),rgba(243,231,199,.92)),url('./Assets/Images/card_bg.jpg');
    background-size:cover;background-position:center;
    box-shadow:0 6px 22px rgba(0,0,0,.3);
    border:1px solid rgba(201,161,74,.3);
    padding:12px 16px;
  }
  .qa-card{
    position:absolute;left:12px;right:12px;padding:10px 14px;border-radius:12px;
    background:linear-gradient(135deg,rgba(255,255,255,.97),rgba(243,231,199,.88));
    color:#5c4423;font-size:14px;line-height:1.75;
    box-shadow:0 4px 14px rgba(0,0,0,.12);transition:transform 3s linear,opacity 1.5s linear;
    pointer-events:none;backdrop-filter:blur(4px);
  }
  .qa-card.hide{opacity:0;transform:translateY(-100px) scale(.96);}
  .qa-card-avatar{
    position:absolute;left:50%;bottom:0;transform:translateX(-50%);
    width:120px;height:100px;display:flex;justify-content:center;align-items:flex-end;
    pointer-events:none;
  }
  .qa-card-avatar video{width:96px;height:120px;object-fit:contain;filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));}
  .qa-chat{
    flex:1;background:rgba(255,255,255,.97);border-radius:14px;padding:12px;
    display:flex;flex-direction:column;gap:10px;overflow:hidden;box-shadow:var(--shadow);
  }
  .qa-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:6px;}
  .qa-msg{padding:10px 14px;border-radius:14px;max-width:80%;font-size:14px;line-height:1.7;white-space:pre-wrap;}
  .qa-msg.user{align-self:flex-end;background:linear-gradient(135deg,#c9a14a,#8c6a24);color:#fff;border-bottom-right-radius:4px;}
  .qa-msg.ai{align-self:flex-start;background:#f6f0dd;color:#333;border-bottom-left-radius:4px;}
  .qa-msg.typing::after{content:"▋";animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:0;}}
  .qa-input-row{display:flex;gap:10px;align-items:center;}
  .qa-controls{display:flex;flex-direction:column;gap:6px;font-size:12px;color:#5c4423;min-width:130px;}
  .qa-controls .row{display:flex;align-items:center;gap:6px;}
  .qa-controls input[type=range]{flex:1;}
  .qa-input{flex:1;display:flex;gap:6px;}
  .qa-input input{flex:1;padding:12px 14px;border-radius:40px;border:1px solid #e8d8a8;background:#fff;font-size:14px;min-height:44px;}
  .qa-input button{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#c9a14a,#8c6a24);color:#fff;font-size:16px;min-height:44px;transition:.25s;}
  .qa-input button:hover{transform:scale(1.08);}

  /* Responsive */
  @media (max-width:720px){
    .trip-layout{flex-direction:column;}
    .trip-left{width:100%;max-height:200px;}
    .qa-layout{padding:10px;gap:8px;}
    .qa-cards{height:120px;}
    .qa-controls{min-width:auto;flex-direction:row;flex-wrap:wrap;}
    .home-entry{flex-direction:column;align-items:stretch;}
    .entry-btn{justify-content:center;}
    .scenic-side-panel{width:86%;max-height:60vh;right:7%;}
    .spot-btn{font-size:11px;padding:5px 8px;}
    .spot-btn.region{font-size:13px;padding:7px 12px;}
  }

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:rgba(201,161,74,.4);border-radius:3px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* Toast */
  .toast{
    position:fixed;top:20%;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:30px;
    font-size:14px;z-index:200;animation:toastIn .3s;
  }
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px);}to{opacity:1;transform:translate(-50%,0);}}

  /* Mobile map touch scaling hint */
  .map-zoom-hint{
    position:absolute;left:50%;bottom:12px;transform:translateX(-50%);
    background:rgba(0,0,0,.45);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;
    z-index:12;pointer-events:none;opacity:.85;
  }

  .loading-dots{display:inline-flex;gap:3px;}
  .loading-dots span{width:6px;height:6px;border-radius:50%;background:#c9a14a;animation:loadDot 1.4s infinite;}
  .loading-dots span:nth-child(2){animation-delay:.2s;}
  .loading-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes loadDot{0%,80%,100%{opacity:.3;}40%{opacity:1;}}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ============ Page 1: Home ============ -->
  <section class="page active" id="home" data-page="home">
    <div class="page-bg">
      <video id="homeVideo" autoplay loop playsinline webkit-playsinline x5-playsinline preload="auto" poster="">
        <source src="./Assets/Video/bj.mp4" type="video/mp4">
        您的浏览器不支持视频播放
      </video>
    </div>
    <div class="page-mask"></div>

// ---- Resources / Paths ----
const MAP_W = 1728;
const MAP_H = 2304;
let mapState = { scale: 1, tx: 0, ty: 0, userTransforming: false };
function computeInitialScale(){
  const wrap = document.getElementById('mapWrap');
  if(!wrap) return 1;
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  const s = Math.min(w / MAP_W, h / MAP_H);
  return Math.max(0.8, Math.min(4, s));
}
function applyMapTransform(){
  const panels = document.getElementById('mapPanels');
  if(!panels) return;
  panels.style.transform = `translate(-50%,-50%) translate(${mapState.tx}px, ${mapState.ty}px) scale(${mapState.scale})`;
}

// Auto slow pan (only when not user-transforming)
let autoPanTimer = null;
function startAutoPan(){
  if(autoPanTimer) return;
  let direction = 1;
  autoPanTimer = setInterval(() => {
    if(mapState.userTransforming) return;
    const step = 0.5;
    const maxOffset = 80;
    mapState.ty += direction * step;
    if(mapState.ty > maxOffset) direction = -1;
    if(mapState.ty < -maxOffset) direction = 1;
    applyMapTransform();
  }, 80);
}
function stopAutoPan(){
  if(autoPanTimer){
    clearInterval(autoPanTimer);
    autoPanTimer = null;
  }
}

function getActiveVideos(){

}
function setAllVideosMuted(muted){
  getActiveVideos().forEach(v => { try { v.muted = muted; } catch(e){} });
}
function tryPlayVideo(v){
  if(!v) return;
  v.muted = true;
  const p = v.play();
  if(p !== undefined && typeof p.catch === 'function'){
    p.catch(() => {
      v.muted = true;
      // try once more on first user interaction
      const resume = () => {
        v.play().catch(()=>{});
        document.removeEventListener('touchstart', resume);
        document.removeEventListener('click', resume);
      };
      document.addEventListener('touchstart', resume, { once: true });
      document.addEventListener('click', resume, { once: true });
    });
  }
}
function tryPlayAll(){
  getActiveVideos().forEach(tryPlayVideo);
}
function toggleMute(video){
  state.muted = !state.muted;
  if(state.muted){
    setAllVideosMuted(true);
    $('#muteBtn i').className = 'fas fa-volume-mute';
    $('#muteBtn2 i').className = 'fas fa-volume-mute';
    toast('🔇 已静音');
  } else {
    // Try unmute all
    setAllVideosMuted(false);
    // Also try to play all (in case any was paused due to policy)
    getActiveVideos().forEach(v => {
      if(!v) return;
      v.play().catch(() => {
        // If blocked, fallback to muted
        v.muted = true;
        v.play().catch(()=>{});
        state.muted = true;
        $('#muteBtn i').className = 'fas fa-volume-mute';
        $('#muteBtn2 i').className = 'fas fa-volume-mute';
        toast('🔇 浏览器限制，暂时静音');
      });
    });

    $('#muteBtn2 i').className = 'fas fa-volume-up';
    if(state.muted === false) toast('🔊 声音已开启');

}

// Focus map on a pixel coordinate (in 1728x2304 space)
function focusMap(px, py){
  mapState.userTransforming = true;
  const wrap = $('#mapWrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  // We want point (px,py) of original map to appear at center of wrap
  // The panels' center (0,0) in transformed world aligns to wrap center
  // A point (px, py) in panels's local coord is at (px-864, py-1152) from panels center
  // After translate (tx, ty) + scale s, screen position = center + ((px-864) + tx) * s, ((py-1152) + ty) * s
  // We want this to equal (w/2, h/2) => ((px-864) + tx) * s = 0 => tx = -(px - 864)
  const s = mapState.scale;
  const idealScale = s; // keep current zoom
  const tx = -(px - MAP_W/2);
  const ty = -(py - MAP_H/2);
  // Smooth animation to new tx/ty
  animateTransform(tx, ty, idealScale);
}

function animateTransform(tx, ty, scale){
  const panels = $('#mapPanels');
  if(!panels) return;
  panels.classList.remove('auto-pan');
  mapState.userTransforming = true;
  panels.style.transition = 'transform .9s cubic-bezier(.4,0,.2,1)';
  mapState.tx = tx;
  mapState.ty = ty;
  mapState.scale = scale;
  applyMapTransform();
  setTimeout(() => {
    panels.style.transition = '';
  }, 900);
}

function highlightRing(px, py){

// ---- Map drag / zoom ----
(function setupMapInteractions(){
  const wrap = $('#mapWrap');
  const img = $('#mapImg');
  let sx=0, sy=0, startT=null, dragging=false, pinch=false, initialScale=1, scale=1, tx=0, ty=0;

  const apply = () => {
    mapState.scale = scale;
    mapState.tx = tx;
    mapState.ty = ty;
    applyMapTransform();
  };

  wrap.addEventListener('mousedown', e => {
    dragging = true;
    mapState.userTransforming = true;
    sx = e.clientX; sy = e.clientY;
    startT = {t: tx, y: ty};
    stopAutoPan();
    const panels = document.getElementById('mapPanels');
    if(panels) panels.style.transition = 'none';
  });
  window.addEventListener('mousemove', e => {
    if(!dragging) return;
    const dx = (e.clientX - sx) / scale;
    const dy = (e.clientY - sy) / scale;
    tx = startT.t + dx; ty = startT.y + dy;
    apply();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    const panels = document.getElementById('mapPanels');
    if(panels) panels.style.transition = 'transform .4s';
    // Resume auto-pan after 3 seconds of inactivity
    mapState._panTimer && clearTimeout(mapState._panTimer);
    mapState._panTimer = setTimeout(() => {
      mapState.userTransforming = false;
      startAutoPan();
    }, 3000);
  });

  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    mapState.userTransforming = true;
    mapState.userTransTimer && clearTimeout(mapState.userTransTimer);
    mapState.userTransTimer = setTimeout(() => { mapState.userTransforming = false; }, 3000);
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    scale = Math.max(0.8, Math.min(4, scale + delta));
    apply();
  }, {passive:false});

  // Touch: drag + pinch
  let tStart = null;
  wrap.addEventListener('touchstart', e => {
    if(e.touches.length === 1){
      tStart = {x:e.touches[0].clientX,y:e.touches[0].clientY,t:{t:tx,y:ty}};
      dragging = true; pinch = false;
      mapState.userTransforming = true;
      stopAutoPan();
      const panels = document.getElementById('mapPanels');
      if(panels) panels.style.transition = 'none';
    } else if(e.touches.length === 2){
      const [a,b] = [e.touches[0],e.touches[1]];
      initialScale = scale;
      pinch = true; dragging = false;
      const dx = b.clientX-a.clientX, dy = b.clientY-a.clientY;
      state._pinchDist = Math.hypot(dx,dy);
      state._pinchStartScale = scale;
    }
  }, {passive:true});
  wrap.addEventListener('touchmove', e => {
    if(pinch && e.touches.length === 2){
      const [a,b] = [e.touches[0],e.touches[1]];
      const dx = b.clientX-a.clientX, dy = b.clientY-a.clientY;
      const d = Math.hypot(dx,dy);
      scale = Math.max(0.8, Math.min(4, state._pinchStartScale * (d / state._pinchDist)));
      apply();
    } else if(dragging && e.touches.length === 1 && tStart){
      const dx = (e.touches[0].clientX - tStart.x) / scale;
      const dy = (e.touches[0].clientY - tStart.y) / scale;
      tx = tStart.t.t + dx; ty = tStart.t.y + dy;
      apply();
    }
  }, {passive:true});
  wrap.addEventListener('touchend', () => {
    dragging = false; pinch = false;
    const panels = document.getElementById('mapPanels');
    if(panels) panels.style.transition = 'transform .4s';
    // Resume auto-pan after 3 seconds
    mapState._panTimer && clearTimeout(mapState._panTimer);
    mapState._panTimer = setTimeout(() => {
      mapState.userTransforming = false;
      startAutoPan();
    }, 3000);
  });
})();

async function loadWeather(dateStr){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=28.85&longitude=121.12&current_weather=true&hourly=temperature_2m,weathercode&daily=temperature_2_max,temperature_2_min,weathercode`;
    const r = await fetch(url);
    const d = await r.json();
    const iconMap = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'❄️',80:'🌦',81:'🌦',82:'⛈',95:'⛈',96:'⛈',99:'⛈'};
    const w = dateStr ? (d.daily && d.daily.weathercode && d.daily.weathercode[0]) : d.current_weather.weathercode;
    const t = dateStr
      ? `${d.daily.temperature_2_min[0]}°C ~ ${d.daily.temperature_2_max[0]}°C`
      : `${d.current_weather.temperature}°C`;
    $('#weatherIcon').textContent = iconMap[w] || '☀️';
    $('#weatherText').textContent = `${dateStr ? '今日' : '实时'}天气 · ${t}`;

    // populate date options
    const sel = $('#weatherDate');
    if(sel.options.length <= 1){
      const defOpt = document.createElement('option');
      defOpt.value = ''; defOpt.textContent = '实时';
      sel.appendChild(defOpt);
      const today = new Date();
      for(let i=0;i<7;i++){
        const dt = new Date(today); dt.setDate(today.getDate()+i);
        const key = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = i===0 ? '今天' : (i===1 ? '明天' : key);
        sel.appendChild(opt);
      }
    }
    if(!dateStr) sel.value = '';
    // ensure weatherPanel visible
    const panel = $('#weatherPanel');
    if(panel) panel.style.display = 'flex';
  }catch(err){
    $('#weatherText').textContent = '天气获取失败';
    console.error(err);
  }
}
$('#weatherDate').addEventListener('change', e => {
  const v = e.target.value;
  if(v) loadWeather(v);
  else loadWeather();
});

async function generateAITrip(){

  btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> 正在生成…';
  const days = $('#daysSel').value;

    const d = await r.json();
    weatherText = `当前台州天气：温度 ${d.current_weather.temperature}°C，天气代码 ${d.current_weather.weathercode}`;
  }catch(e){}

  const prompt = `你是台州府城文化旅游区的资深导游。请为以下旅行者设计一份详细的${days}天行程：
- 兴趣：${interest}

- 季节：${seasonPrefix()}

要求：
1. 涵盖台州府城墙、东湖、紫阳街三大核心区域，以及瓮城、西门街、白云楼、望天台（天坛）、揽胜门、樵云阁、湖心亭等景点
2. 每天按上午、下午、晚上分段，标注时间和交通建议
3. 推荐当地特色美食（如麦虾、糟羹、乌米饭、姜汤面）
4. 结合天气和季节给出穿搭建议
5. 语言亲切，简洁有力，使用中文输出，Markdown格式`;

  const resultEl = $('#aiPlanResult');
  resultEl.textContent = 'AI 正在思考…';

  try{
    const key = ((typeof window !== 'undefined' && window.__AI_KEY__) || '').trim();
    if(!key){
      resultEl.textContent = '未能连接AI服务，请稍后再试。';
      btn.disabled = false;

      return;
    }
    const resp = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${key}`
      },
      body: JSON.stringify({

        messages:[{role:'user', content:prompt}],
        temperature:0.7

    });
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '未能获取结果，请稍后重试。';

    resultEl.textContent = '生成失败：' + err.message + '\n\n请检查网络和API Key配置。';
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i> 重新生成行程';
}

let cardIndex = 0;
let cardTimer = null;

function startCardScroll(){
  const box = $('#qaCards');
  box.innerHTML = '';
  cardIndex = 0;
  const initial = 3;
  for(let i=0;i<initial;i++){
    addCard(presetCards[cardIndex % presetCards.length], i * 30);
    cardIndex++;
  }
  clearInterval(cardTimer);
  cardTimer = setInterval(() => {
    addCard(presetCards[cardIndex % presetCards.length], 0);
    cardIndex++;
  }, 3500);
}
function addCard(text, delay){
  const box = $('#qaCards');
  const card = document.createElement('div');
  card.className = 'qa-card';
  card.style.bottom = '-40px';
  card.style.opacity = '0';
  card.textContent = text;
  box.appendChild(card);
  requestAnimationFrame(() => {
    card.style.transition = 'transform 1.5s linear, opacity 1.5s linear';
    card.style.transform = `translateY(-${200 + delay}px)`;
    card.style.opacity = '1';
  });
  setTimeout(() => {
    card.classList.add('hide');
  }, 4500 + delay);
  setTimeout(() => card.remove(), 6200 + delay);
}

// Speech
function readText(text, label){
  if(!window.speechSynthesis){
    toast('当前浏览器不支持语音合成');
    return;
  }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = state.speechRate;
  if(!state.speechEnabled){
    toast('语音已关闭');
    return;
  }
  // Mute all videos during speech
  setAllVideosMuted(true);
  u.onend = () => {
    // Restore video sound only if not manually muted
    if(!state.muted) setAllVideosMuted(false);
  };
  u.onerror = () => {
    if(!state.muted) setAllVideosMuted(false);
  };
  window.speechSynthesis.speak(u);
  state.currentUtter = u;
  if(label) toast(`正在朗读：${label}`);
}

$('#speechRate').addEventListener('input', e => {
  state.speechRate = parseFloat(e.target.value);
  $('#rateVal').textContent = state.speechRate.toFixed(1);
  if(state.currentUtter){
    state.currentUtter.rate = state.speechRate;
  }
});
$('#speechToggle').addEventListener('change', e => {
  state.speechEnabled = e.target.checked;
  $('#speechStatus').textContent = state.speechEnabled ? '开' : '关';
  if(!state.speechEnabled) window.speechSynthesis && window.speechSynthesis.cancel();
});

async function sendQuestion(){
  const input = $('#qaInput');
  const q = input.value.trim();
  if(!q) return;
  const messages = $('#qaMessages');
  const userMsg = document.createElement('div');
  userMsg.className = 'qa-msg user';
  userMsg.textContent = q;
  messages.appendChild(userMsg);
  input.value = '';
  messages.scrollTop = messages.scrollHeight;

  const aiMsg = document.createElement('div');
  aiMsg.className = 'qa-msg ai typing';
  aiMsg.textContent = '思考中';
  messages.appendChild(aiMsg);
  messages.scrollTop = messages.scrollHeight;

  try{
    const key = ((typeof window !== 'undefined' && window.__AI_KEY__) || '').trim();
    if(!key){
      aiMsg.classList.remove('typing');
      aiMsg.textContent = '关于"'+q+'"：'+getFallbackAnswer(q);
      return;
    }
    const resp = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${key}`
      },
      body: JSON.stringify({
        model:'glm-4.7-flash',
        messages:[
          {role:'system', content:'你是台州府城文化旅游区的AI导览助手，名叫"府城小助手"。请用亲切、专业的中文回答游客关于台州府城的问题。回答简洁，有实用建议。'},
          {role:'user', content:q}
        ],
        temperature:0.7
      })
    });
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '暂无答案，换个问题试试？';
    aiMsg.classList.remove('typing');
    aiMsg.textContent = text;
    if(state.speechEnabled) readText(text);
  }catch(err){
    aiMsg.classList.remove('typing');
    aiMsg.textContent = '回答失败：' + err.message;
  }
  messages.scrollTop = messages.scrollHeight;
}
$('#sendBtn').addEventListener('click', sendQuestion);
$('#qaInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') sendQuestion();
});

      k = String(window.__AI_KEY__).trim();

    // 若仍为空，则使用默认内置 Key
    if(!k){
      k = '71541782829687972';

    }
    window.__AI_KEY__ = k;
  } catch(e){

})();
function init(){
  try{
    const firstInteract = () => {
      getActiveVideos().forEach(v => {
        if(v){
          v.muted = false;
          v.play().catch(()=>{});
        }
      });
      const mb = document.getElementById('muteBtn');
      const mb2 = document.getElementById('muteBtn2');
      if(mb) mb.querySelector('i').className = 'fas fa-volume-up';
      if(mb2) mb2.querySelector('i').className = 'fas fa-volume-up';
      state.muted = false;
    };
    const firstHandler = () => {
      firstInteract();
      document.removeEventListener('click', firstHandler);
      document.removeEventListener('touchstart', firstHandler);
      document.removeEventListener('keydown', firstHandler);
    };
    document.addEventListener('click', firstHandler);
    document.addEventListener('touchstart', firstHandler);
    document.addEventListener('keydown', firstHandler);

    // Try unmuted autoplay first
    getActiveVideos().forEach(v => {
      if(!v) return;
      v.muted = false;
      const p = v.play();
      if(p !== undefined && typeof p.catch === 'function'){
        p.catch(() => {
          v.muted = true;
          v.play().catch(()=>{});
          const mb = document.getElementById('muteBtn');
          const mb2 = document.getElementById('muteBtn2');
          if(mb) mb.querySelector('i').className = 'fas fa-volume-mute';
          if(mb2) mb2.querySelector('i').className = 'fas fa-volume-mute';
          state.muted = true;
        });
      }
    });

    applySeason();
    rebuildSpotLayer();
    showHomeBigTitle();
    loadWeather();
    updateRouteImg();

    mapState.scale = computeInitialScale();
    mapState.tx = 0;
    mapState.ty = 0;
    applyMapTransform();

    setTimeout(startAutoPan, 1500);

    window.addEventListener('resize', () => {
      if(!mapState.userTransforming){
        mapState.scale = computeInitialScale();
        applyMapTransform();
      }
    });

    setTimeout(() => {
      toast('🎋 欢迎来到台州府城智慧文旅AI导览系统');

        toast('💡 点击页面任意位置开启视频声音');

      }
    }, 800);
  }catch(err){
    console.error('Init error:', err);
    toast('初始化出错：' + err.message);
  }
}
if(document.readyState === 'loading'){

} else {
