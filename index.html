<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台州府城文化旅游区</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-spring">
    <div id="app">
        <section id="page-home" class="page active-page">
            <video id="home-video" class="bg-video" autoplay loop muted playsinline>
                <source src="Assets/video/bj.mp4" type="video/mp4">
            </video>
            <button id="home-mute-btn" class="mute-btn" onclick="toggleMute('home-video')">🔇</button>
            
            <div class="top-overlay">
                <h1>台州府城文化旅游区</h1>
            </div>
            
            <div id="intro-animation" class="intro-animation">
                <h1>台州府城旅游区</h1>
            </div>
            
            <div class="bottom-cards">
                <div class="feature-card" onclick="navigateTo('page-guide')">
                    <div class="card-icon">🗺️</div>
                    <h3>景点导览</h3>
                    <p>探索千年古城的魅力</p>
                </div>
                <div class="feature-card" onclick="navigateTo('page-plan')">
                    <div class="card-icon">📅</div>
                    <h3>行程规划</h3>
                    <p>定制专属旅行路线</p>
                </div>
                <div class="feature-card" onclick="navigateTo('page-qa')">
                    <div class="card-icon">🤖</div>
                    <h3>智能问答</h3>
                    <p>AI助手为您解答</p>
                </div>
            </div>
            
            <div class="season-selector">
                <button class="season-btn spring" onclick="setSeason('spring')" data-season="spring">春</button>
                <button class="season-btn summer" onclick="setSeason('summer')" data-season="summer">夏</button>
                <button class="season-btn autumn" onclick="setSeason('autumn')" data-season="autumn">秋</button>
                <button class="season-btn winter" onclick="setSeason('winter')" data-season="winter">冬</button>
            </div>
        </section>

        <section id="page-guide" class="page">
            <div class="guide-header">
                <h1>景点导览</h1>
            </div>
            
            <div class="map-container" id="map-container">
                <div class="map-wrapper" id="map-wrapper">
                    <img id="guide-map" class="guide-map" src="Assets/images/map/Spring_map.png" alt="景区地图">
                    
                    <button class="area-btn" data-area="台州府城" data-x="946" data-y="360" data-vr="https://ad9ovdw3v.wasee.com/wt/ad9ovdw3v?def_sid=1767393" onclick="showArea(this)">台州府城</button>
                    <button class="area-btn" data-area="东湖" data-x="1450" data-y="745" data-vr="https://5a5zazkru.wasee.com/wt/5a5zazkru?def_sid=2223677" onclick="showArea(this)">东湖</button>
                    <button class="area-btn" data-area="紫阳街" data-x="635" data-y="1389" data-vr="https://6695ayfhl.wasee.com/wt/6695ayfhl?def_sid=2865446" onclick="showArea(this)">紫阳街</button>
                    
                    <button class="spot-btn" data-spot="瓮城" data-x="870" data-y="1823" onclick="showSpot(this)">瓮城</button>
                    <button class="spot-btn" data-spot="西门街" data-x="870" data-y="1110" onclick="showSpot(this)">西门街</button>
                    <button class="spot-btn" data-spot="白云楼" data-x="1151" data-y="213" onclick="showSpot(this)">白云楼</button>
                    <button class="spot-btn" data-spot="天坛" data-x="486" data-y="595" onclick="showSpot(this)">天坛</button>
                    <button class="spot-btn" data-spot="揽胜门" data-x="1286" data-y="546" onclick="showSpot(this)">揽胜门</button>
                    <button class="spot-btn" data-spot="樵云阁" data-x="1376" data-y="852" onclick="showSpot(this)">樵云阁</button>
                    <button class="spot-btn" data-spot="湖心亭" data-x="1389" data-y="913" onclick="showSpot(this)">湖心亭</button>
                </div>
                
                <div id="vr-button" class="vr-button" style="display: none;">
                    <button onclick="openVR()">体验VR</button>
                </div>
            </div>
            
            <div id="spot-modal" class="modal" style="display: none;">
                <div class="modal-content spot-modal-content">
                    <button class="close-btn" onclick="closeSpotModal()">×</button>
                    <div class="carousel">
                        <img id="spot-img-1" class="carousel-img" src="" alt="">
                        <img id="spot-img-2" class="carousel-img" src="" alt="" style="display: none;">
                        <button class="carousel-prev" onclick="prevCarousel()">‹</button>
                        <button class="carousel-next" onclick="nextCarousel()">›</button>
                    </div>
                    <div class="spot-info">
                        <h2 id="spot-title"></h2>
                        <p id="spot-desc"></p>
                    </div>
                    <div class="audio-controls">
                        <button id="audio-play-btn" onclick="toggleAudio()">▶</button>
                        <div class="audio-progress">
                            <div id="audio-progress-bar"></div>
                        </div>
                        <button id="audio-stop-btn" onclick="stopAudio()">■</button>
                        <button id="subtitle-toggle" onclick="toggleSubtitle()">字幕开关</button>
                    </div>
                    <div id="subtitle-display" class="subtitle" style="display: none;"></div>
                </div>
            </div>
            
            <div id="vr-modal" class="modal" style="display: none;">
                <div class="modal-content vr-content">
                    <button class="close-btn" onclick="closeVRModal()">×</button>
                    <iframe id="vr-iframe" src="" frameborder="0"></iframe>
                </div>
            </div>
            
            <nav class="bottom-nav">
                <button onclick="navigateTo('page-home')">首页</button>
                <button onclick="navigateTo('page-guide')" class="active">景点导览</button>
                <button onclick="navigateTo('page-plan')">行程规划</button>
                <button onclick="navigateTo('page-qa')">智能问答</button>
            </nav>
        </section>

        <section id="page-plan" class="page">
            <video id="plan-video" class="bg-video" autoplay loop muted playsinline>
                <source src="Assets/video/bj.mp4" type="video/mp4">
            </video>
            <button id="plan-mute-btn" class="mute-btn" onclick="toggleMute('plan-video')">🔇</button>
            
            <div class="weather-module" id="weather-module">
                <h3>天气信息</h3>
                <div id="weather-content">加载中...</div>
            </div>
            
            <div class="plan-container">
                <div class="sidebar">
                    <button class="sidebar-btn active" onclick="showPlanTab('official')">官方推荐</button>
                    <button class="sidebar-btn" onclick="showPlanTab('smart')">智能推荐</button>
                </div>
                
                <div class="plan-content">
                    <div id="official-plan" class="plan-tab">
                        <div class="route-buttons">
                            <button onclick="showRoute('A')">路线A</button>
                            <button onclick="showRoute('B')">路线B</button>
                        </div>
                        <div class="route-display">
                            <img id="route-map" class="route-image" src="Assets/images/roadmap/A/Spring_Amap.png" alt="路线图">
                            <div class="route-info" id="route-info">
                                <h3>路线A：经典一日游</h3>
                                <p>上午：台州府城墙 → 揽胜门 → 天坛</p>
                                <p>中午：紫阳街品尝美食</p>
                                <p>下午：东湖 → 湖心亭 → 白云楼</p>
                                <p>晚上：西门街夜景</p>
                            </div>
                        </div>
                    </div>
                    
                    <div id="smart-plan" class="plan-tab" style="display: none;">
                        <div class="smart-form">
                            <div class="form-group">
                                <label>游玩天数</label>
                                <select id="days-select">
                                    <option value="1">1天</option>
                                    <option value="2">2天</option>
                                    <option value="3">3天</option>
                                    <option value="4">4天</option>
                                    <option value="5">5天</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>兴趣类型</label>
                                <div class="checkbox-group">
                                    <label><input type="checkbox" name="interest" value="历史">历史</label>
                                    <label><input type="checkbox" name="interest" value="自然">自然</label>
                                    <label><input type="checkbox" name="interest" value="美食">美食</label>
                                    <label><input type="checkbox" name="interest" value="亲子">亲子</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>是否携带老人小孩</label>
                                <select id="family-select">
                                    <option value="否">否</option>
                                    <option value="是">是</option>
                                </select>
                            </div>
                            <button class="submit-btn" onclick="generatePlan()">生成行程</button>
                        </div>
                        <div id="plan-result" class="plan-result"></div>
                    </div>
                </div>
            </div>
            
            <nav class="bottom-nav">
                <button onclick="navigateTo('page-home')">首页</button>
                <button onclick="navigateTo('page-guide')">景点导览</button>
                <button onclick="navigateTo('page-plan')" class="active">行程规划</button>
                <button onclick="navigateTo('page-qa')">智能问答</button>
            </nav>
        </section>

        <section id="page-qa" class="page">
            <div class="qa-container">
                <div class="qa-cards">
                    <div class="qa-card">
                        <div class="card-content">
                            <p>台州府城有哪些必去景点？</p>
                        </div>
                    </div>
                    <div class="qa-card">
                        <div class="card-content">
                            <p>如何规划一日游行程？</p>
                        </div>
                    </div>
                    <div class="qa-card">
                        <div class="card-content">
                            <p>台州特色美食有哪些？</p>
                        </div>
                    </div>
                    <div class="qa-card">
                        <div class="card-content">
                            <p>最佳旅游季节是什么时候？</p>
                        </div>
                    </div>
                    <div class="qa-card">
                        <div class="card-content">
                            <p>周边还有什么值得游览的地方？</p>
                        </div>
                    </div>
                </div>
                
                <div class="girl-video-container">
                    <video id="girl-video" autoplay loop muted playsinline>
                        <source src="Assets/video/girl.mp4" type="video/mp4">
                    </video>
                </div>
                
                <div class="qa-input-area">
                    <input type="text" id="qa-input" placeholder="请输入您想了解的问题..." onkeypress="handleQAKeyPress(event)">
                    <button onclick="submitQA()">发送</button>
                </div>
                
                <div class="voice-controls">
                    <label>语速调节</label>
                    <input type="range" id="rate-slider" min="0.5" max="2" step="0.1" value="1">
                    <button id="voice-toggle" onclick="toggleVoice()">语音关闭</button>
                </div>
                
                <div id="qa-result" class="qa-result"></div>
            </div>
            
            <nav class="bottom-nav">
                <button onclick="navigateTo('page-home')">首页</button>
                <button onclick="navigateTo('page-guide')">景点导览</button>
                <button onclick="navigateTo('page-plan')">行程规划</button>
                <button onclick="navigateTo('page-qa')" class="active">智能问答</button>
            </nav>
        </section>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
